<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Markdown プレビューエディタ</title>
    <!-- Tailwind CSS & Typographyプラグイン (プレビューを綺麗にするため) -->
    <script src="https://cdn.tailwindcss.com?plugins=typography"></script>
    <!-- Marked.js (MarkdownをHTMLに変換するライブラリ) -->
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <style>
        body { font-family: 'Helvetica Neue', Arial, sans-serif; }
        /* スクロールバーのデザイン調整 */
        ::-webkit-scrollbar { width: 8px; height: 8px; }
        ::-webkit-scrollbar-track { background: #f1f1f1; }
        ::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 4px; }
        ::-webkit-scrollbar-thumb:hover { background: #94a3b8; }
    </style>

    <!-- PWA Settings -->
    <link rel="manifest" href="manifest.json">
    <link rel="icon" type="image/png" href="icon-192.png">
    <script>
        if ('serviceWorker' in navigator) {
            navigator.serviceWorker.register('service-worker.js');
        }
    </script>
</head>
<body class="bg-gray-50 flex flex-col h-screen overflow-hidden">

    <!-- ヘッダー -->
    <header class="bg-gray-800 text-white p-3 flex justify-between items-center shadow-md z-10">
        <h1 class="text-lg md:text-xl font-bold flex items-center gap-2">
            <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6" fill="none" viewBox="0 0 24 24" stroke="currentColor">
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 12h6m-6 4h6m2 5H7a2 2 0 01-2-2V5a2 2 0 012-2h5.586a1 1 0 01.707.293l5.414 5.414a1 1 0 01.293.707V19a2 2 0 01-2 2z" />
            </svg>
            Markdown Editor
        </h1>
        <div class="flex gap-2">
            <button onclick="clearEditor()" class="bg-gray-600 hover:bg-gray-500 text-sm px-3 py-2 rounded transition">クリア</button>
            <button onclick="downloadMD()" class="bg-blue-600 hover:bg-blue-500 text-sm px-3 py-2 rounded transition flex items-center gap-1">
                <svg xmlns="http://www.w3.org/2000/svg" class="h-4 w-4 hidden md:block" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 16v1a3 3 0 003 3h10a3 3 0 003-3v-1m-4-4l-4 4m0 0l-4-4m4 4V4" />
                </svg>
                保存(.md)
            </button>
        </div>
    </header>

    <!-- メインコンテンツ -->
    <main class="flex-1 flex flex-col md:flex-row overflow-hidden">
        <!-- エディタエリア (左側) -->
        <div class="w-full md:w-1/2 h-1/2 md:h-full border-b md:border-b-0 md:border-r border-gray-300 relative bg-white">
            <div class="absolute top-0 left-0 bg-gray-200 text-gray-600 text-xs px-2 py-1 rounded-br opacity-80 pointer-events-none">エディタ</div>
            <textarea 
                id="editor" 
                class="w-full h-full p-6 pt-8 resize-none outline-none text-gray-800 font-mono text-sm leading-relaxed bg-transparent"
                placeholder="ここにMarkdownを入力してください..."></textarea>
        </div>

        <!-- プレビューエリア (右側) -->
        <div class="w-full md:w-1/2 h-1/2 md:h-full bg-white relative overflow-y-auto" id="previewContainer">
            <div class="sticky top-0 left-0 bg-gray-200 text-gray-600 text-xs px-2 py-1 rounded-br inline-block opacity-80 z-10 pointer-events-none">プレビュー</div>
            <!-- proseクラスをつけることで、自動的に美しいマークダウンスタイルが適用されます -->
            <div id="preview" class="p-6 pt-2 prose prose-blue max-w-none"></div>
        </div>
    </main>

    <script>
        const editor = document.getElementById('editor');
        const preview = document.getElementById('preview');
        const previewContainer = document.getElementById('previewContainer');

        // 初回起動時に表示されるサンプルテキスト
        const defaultText = `# Markdown プレビューエディタ

左側にマークダウンを記述すると、**リアルタイム**に右側にプレビューされます。

## 搭載している便利機能
- ⚡️ **リアルタイム変換**: 文字を打つと即座に右側に反映されます。
- 💾 **自動保存**: ブラウザを閉じても、次回開いた時に続きから書けます。
- 📜 **スクロール同期**: 左側をスクロールすると、右側も一緒に動きます。
- ⬇️ **ダウンロード機能**: 右上のボタンから \`.md\` ファイルとして保存できます。

### 書き方の例

**リスト:**
1. 項目 1
2. 項目 2
   - サブ項目 A
   - サブ項目 B

**コードブロック:**
\`\`\`javascript
function helloWorld() {
    console.log("Hello, World!");
}
\`\`\`

**引用:**
> これは引用です。
> 簡単に見やすいドキュメントが作れます。

**テーブル:**

| 名前 | 役割 |
| :--- | :--- |
| アリス | 開発者 |
| ボブ | デザイナー |

---
*さあ、右上の「クリア」ボタンを押して、自分のメモを書き始めましょう！*
`;

        // Marked.js の設定（改行を有効にするなど）
        marked.setOptions({
            breaks: true, // 通常のEnter改行を<br>に変換
            gfm: true     // GitHubライクなマークダウンを有効化
        });

        // プレビューを更新して保存する関数
        function updatePreview() {
            const markdownText = editor.value;
            // MarkdownをHTMLに変換して流し込む
            preview.innerHTML = marked.parse(markdownText);
            // ローカルストレージに自動保存
            localStorage.setItem('savedMarkdown', markdownText);
        }

        // 入力するたびにプレビューを更新
        editor.addEventListener('input', updatePreview);

        // スクロール同期（エディタをスクロールしたらプレビューも動かす）
        editor.addEventListener('scroll', () => {
            const percentage = editor.scrollTop / (editor.scrollHeight - editor.clientHeight);
            previewContainer.scrollTop = percentage * (previewContainer.scrollHeight - previewContainer.clientHeight);
        });

        // 初期化処理
        function init() {
            const savedText = localStorage.getItem('savedMarkdown');
            if (savedText !== null) {
                editor.value = savedText; // 保存データがあれば読み込む
            } else {
                editor.value = defaultText; // なければサンプルを表示
            }
            updatePreview();
        }

        // クリアボタンの処理
        function clearEditor() {
            if (confirm('エディタの内容を全て消去しますか？')) {
                editor.value = '';
                updatePreview();
                editor.focus();
            }
        }

        // .md ファイルとしてダウンロードする機能
        function downloadMD() {
            const text = editor.value;
            if(!text) {
                alert('保存する内容がありません。');
                return;
            }
            // テキストファイルとしてBlobを作成
            const blob = new Blob([text], { type: 'text/markdown' });
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            
            // 今日の日付をファイル名にする (例: memo_20231025.md)
            const date = new Date();
            const yyyy = date.getFullYear();
            const mm = String(date.getMonth() + 1).padStart(2, '0');
            const dd = String(date.getDate()).padStart(2, '0');
            
            a.href = url;
            a.download = `memo_${yyyy}${mm}${dd}.md`;
            document.body.appendChild(a);
            a.click();
            document.body.removeChild(a);
            URL.revokeObjectURL(url);
        }

        // アプリ起動
        init();
    </script>
</body>
</html>
